services:
  - type: static
    name: hrsp-frontend-free
    plan: free
    rootDir: frontend/frontend
    # No lockfile is currently present, so npm install is required instead of npm ci.
    buildCommand: npm install && npm run build
    # Render uses staticPublishPath, which is the publishDir equivalent.
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://hrsp-backend-free.onrender.com
      - key: VITE_API_TIMEOUT_MS
        value: "15000"

  - type: web
    runtime: python
    name: hrsp-backend-free
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: FRONTEND_URL
        value: https://hrsp-frontend-free.onrender.com
      - key: FRONTEND_PAYMENT_RETURN_URL
        value: https://hrsp-frontend-free.onrender.com/sharing/requests/outgoing
      - key: CORS_ALLOWED_ORIGINS
        value: https://hrsp-frontend-free.onrender.com
      # Free tier setup: backend calls ML through ML's public Render URL.
      - key: ML_SERVER_B_BASE_URL
        value: https://hrsp-ml-server-free.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CHANNEL_LAYER_REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: ML_SERVER_B_HMAC_SECRET
        sync: false

  # Free tier limitation: private services are unavailable, so ML must be a public web service.
  # For production/hardened setup, switch this to pserv and point backend to an internal URL.
  - type: web
    runtime: python
    name: hrsp-ml-server-free
    plan: free
    rootDir: "ML server"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_VERSION
        value: "1.0.0"
      - key: CALLBACK_TIMEOUT_SECONDS
        value: "10"
      - key: CALLBACK_MAX_RETRIES
        value: "3"
