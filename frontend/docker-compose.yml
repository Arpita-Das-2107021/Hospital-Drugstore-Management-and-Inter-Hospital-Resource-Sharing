services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=1
      - VITE_HMR_HOST=host.docker.internal
      - VITE_HMR_CLIENT_PORT=8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
volumes:
  # keep node_modules isolated from host
  frontend_node_modules:
