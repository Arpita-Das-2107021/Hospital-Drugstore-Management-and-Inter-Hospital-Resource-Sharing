services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      gunicorn config.asgi:application
      --bind 0.0.0.0:8080
      --worker-class uvicorn.workers.UvicornWorker
      --workers ${GUNICORN_WORKERS:-2}
      --timeout ${GUNICORN_TIMEOUT:-60}
      --access-logfile -
      --error-logfile -
      --log-level info
    volumes:
      - static_files:/app/static
      - media_files:/app/media
      - app_logs:/app/logs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - USE_MINIO_CHAT_STORAGE=${USE_MINIO_CHAT_STORAGE:-true}
      - MINIO_ENDPOINT_URL=${MINIO_ENDPOINT_URL:-http://minio:9000}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-hrsp-chat-attachments}
      - ML_DATASET_PIPELINE_ENABLED=${ML_DATASET_PIPELINE_ENABLED:-true}
      - ML_AUTO_DISPATCH_ON_JOB_CREATE=${ML_AUTO_DISPATCH_ON_JOB_CREATE:-true}
      - ML_DATASET_BUCKET_NAME=${ML_DATASET_BUCKET_NAME:-ml-input}
      - ML_SERVER_B_BASE_URL=${ML_SERVER_B_BASE_URL:-}
      - ML_SERVER_B_MODEL1_PREDICT_PATH=${ML_SERVER_B_MODEL1_PREDICT_PATH:-/api/v1/inference/model1/predict}
      - ML_SERVER_B_MODEL2_PREDICT_PATH=${ML_SERVER_B_MODEL2_PREDICT_PATH:-/api/v1/inference/model2/predict}
      - ML_SERVER_B_MODEL1_TRAIN_PATH=${ML_SERVER_B_MODEL1_TRAIN_PATH:-/api/v1/training/model1/train}
      - ML_SERVER_B_MODEL2_TRAIN_PATH=${ML_SERVER_B_MODEL2_TRAIN_PATH:-/api/v1/training/model2/train}
      - ML_SERVER_B_REQUEST_TIMEOUT_SECONDS=${ML_SERVER_B_REQUEST_TIMEOUT_SECONDS:-30}
      - ML_SERVER_B_CALLBACK_TIMEOUT_SECONDS=${ML_SERVER_B_CALLBACK_TIMEOUT_SECONDS:-10}
      - ML_SERVER_B_HMAC_SECRET=${ML_SERVER_B_HMAC_SECRET:-change-me-server-b-callback-secret}
      - ML_SERVER_B_HMAC_SECRET_FALLBACKS=${ML_SERVER_B_HMAC_SECRET_FALLBACKS:-}
      - ML_CALLBACK_ACCEPT_SERVER_B_SHA256=${ML_CALLBACK_ACCEPT_SERVER_B_SHA256:-true}
      - ML_CALLBACK_ACCEPT_LEGACY_HMAC=${ML_CALLBACK_ACCEPT_LEGACY_HMAC:-false}
      - ML_CALLBACK_REPLAY_TTL_SECONDS=${ML_CALLBACK_REPLAY_TTL_SECONDS:-300}
      - ML_SERVER_A_CALLBACK_URL=${ML_SERVER_A_CALLBACK_URL:-}
      - ML_SERVER_A_TRAINING_CALLBACK_URL=${ML_SERVER_A_TRAINING_CALLBACK_URL:-}
      - ML_TRAINING_MIRROR_ENABLED=${ML_TRAINING_MIRROR_ENABLED:-true}
      - ML_TRAINING_MIRROR_MAX_RETRIES=${ML_TRAINING_MIRROR_MAX_RETRIES:-3}
      - ML_TRAINING_MIRROR_BACKOFF_SECONDS=${ML_TRAINING_MIRROR_BACKOFF_SECONDS:-1}
      - ML_TRAINING_MIRROR_DEAD_LETTER_LOG_PATH=${ML_TRAINING_MIRROR_DEAD_LETTER_LOG_PATH:-/app/logs/ml_training_mirror_dead_letter.jsonl}
      - ML_SERVER_B_MINIO_ENDPOINT_URL=${ML_SERVER_B_MINIO_ENDPOINT_URL:-${MINIO_ENDPOINT_URL:-http://minio:9000}}
      - ML_SERVER_B_MINIO_ACCESS_KEY=${ML_SERVER_B_MINIO_ACCESS_KEY:-${MINIO_ACCESS_KEY:-minioadmin}}
      - ML_SERVER_B_MINIO_SECRET_KEY=${ML_SERVER_B_MINIO_SECRET_KEY:-${MINIO_SECRET_KEY:-minioadmin}}
      - ML_SERVER_B_MINIO_REGION_NAME=${ML_SERVER_B_MINIO_REGION_NAME:-${MINIO_REGION_NAME:-us-east-1}}
      - ML_SERVER_B_MINIO_BUCKET_NAME_OVERRIDE=${ML_SERVER_B_MINIO_BUCKET_NAME_OVERRIDE:-}
      - ML_SERVER_B_MINIO_KEY_PREFIX=${ML_SERVER_B_MINIO_KEY_PREFIX:-}
      - HOSPITAL_API_LOCALHOST_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    expose:
      - "8080"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A config.celery worker
      --loglevel=info
      --autoscale=${CELERY_WORKER_AUTOSCALE_MAX:-4},${CELERY_WORKER_AUTOSCALE_MIN:-1}
      --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    volumes:
      - app_logs:/app/logs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - USE_MINIO_CHAT_STORAGE=${USE_MINIO_CHAT_STORAGE:-true}
      - MINIO_ENDPOINT_URL=${MINIO_ENDPOINT_URL:-http://minio:9000}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-hrsp-chat-attachments}
      - ML_DATASET_PIPELINE_ENABLED=${ML_DATASET_PIPELINE_ENABLED:-true}
      - ML_AUTO_DISPATCH_ON_JOB_CREATE=${ML_AUTO_DISPATCH_ON_JOB_CREATE:-true}
      - ML_DATASET_BUCKET_NAME=${ML_DATASET_BUCKET_NAME:-ml-input}
      - ML_SERVER_B_BASE_URL=${ML_SERVER_B_BASE_URL:-}
      - ML_SERVER_B_MODEL1_PREDICT_PATH=${ML_SERVER_B_MODEL1_PREDICT_PATH:-/api/v1/inference/model1/predict}
      - ML_SERVER_B_MODEL2_PREDICT_PATH=${ML_SERVER_B_MODEL2_PREDICT_PATH:-/api/v1/inference/model2/predict}
      - ML_SERVER_B_MODEL1_TRAIN_PATH=${ML_SERVER_B_MODEL1_TRAIN_PATH:-/api/v1/training/model1/train}
      - ML_SERVER_B_MODEL2_TRAIN_PATH=${ML_SERVER_B_MODEL2_TRAIN_PATH:-/api/v1/training/model2/train}
      - ML_SERVER_B_REQUEST_TIMEOUT_SECONDS=${ML_SERVER_B_REQUEST_TIMEOUT_SECONDS:-30}
      - ML_SERVER_B_CALLBACK_TIMEOUT_SECONDS=${ML_SERVER_B_CALLBACK_TIMEOUT_SECONDS:-10}
      - ML_SERVER_B_HMAC_SECRET=${ML_SERVER_B_HMAC_SECRET:-change-me-server-b-callback-secret}
      - ML_SERVER_B_HMAC_SECRET_FALLBACKS=${ML_SERVER_B_HMAC_SECRET_FALLBACKS:-}
      - ML_CALLBACK_ACCEPT_SERVER_B_SHA256=${ML_CALLBACK_ACCEPT_SERVER_B_SHA256:-true}
      - ML_CALLBACK_ACCEPT_LEGACY_HMAC=${ML_CALLBACK_ACCEPT_LEGACY_HMAC:-false}
      - ML_CALLBACK_REPLAY_TTL_SECONDS=${ML_CALLBACK_REPLAY_TTL_SECONDS:-300}
      - ML_SERVER_A_CALLBACK_URL=${ML_SERVER_A_CALLBACK_URL:-}
      - ML_SERVER_A_TRAINING_CALLBACK_URL=${ML_SERVER_A_TRAINING_CALLBACK_URL:-}
      - ML_TRAINING_MIRROR_ENABLED=${ML_TRAINING_MIRROR_ENABLED:-true}
      - ML_TRAINING_MIRROR_MAX_RETRIES=${ML_TRAINING_MIRROR_MAX_RETRIES:-3}
      - ML_TRAINING_MIRROR_BACKOFF_SECONDS=${ML_TRAINING_MIRROR_BACKOFF_SECONDS:-1}
      - ML_TRAINING_MIRROR_DEAD_LETTER_LOG_PATH=${ML_TRAINING_MIRROR_DEAD_LETTER_LOG_PATH:-/app/logs/ml_training_mirror_dead_letter.jsonl}
      - ML_SERVER_B_MINIO_ENDPOINT_URL=${ML_SERVER_B_MINIO_ENDPOINT_URL:-${MINIO_ENDPOINT_URL:-http://minio:9000}}
      - ML_SERVER_B_MINIO_ACCESS_KEY=${ML_SERVER_B_MINIO_ACCESS_KEY:-${MINIO_ACCESS_KEY:-minioadmin}}
      - ML_SERVER_B_MINIO_SECRET_KEY=${ML_SERVER_B_MINIO_SECRET_KEY:-${MINIO_SECRET_KEY:-minioadmin}}
      - ML_SERVER_B_MINIO_REGION_NAME=${ML_SERVER_B_MINIO_REGION_NAME:-${MINIO_REGION_NAME:-us-east-1}}
      - ML_SERVER_B_MINIO_BUCKET_NAME_OVERRIDE=${ML_SERVER_B_MINIO_BUCKET_NAME_OVERRIDE:-}
      - ML_SERVER_B_MINIO_KEY_PREFIX=${ML_SERVER_B_MINIO_KEY_PREFIX:-}
      - HOSPITAL_API_LOCALHOST_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - app_logs:/app/logs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - USE_MINIO_CHAT_STORAGE=${USE_MINIO_CHAT_STORAGE:-true}
      - MINIO_ENDPOINT_URL=${MINIO_ENDPOINT_URL:-http://minio:9000}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-hrsp-chat-attachments}
      - ML_DATASET_PIPELINE_ENABLED=${ML_DATASET_PIPELINE_ENABLED:-true}
      - ML_AUTO_DISPATCH_ON_JOB_CREATE=${ML_AUTO_DISPATCH_ON_JOB_CREATE:-true}
      - ML_DATASET_BUCKET_NAME=${ML_DATASET_BUCKET_NAME:-ml-input}
      - ML_SERVER_B_BASE_URL=${ML_SERVER_B_BASE_URL:-}
      - ML_SERVER_B_MODEL1_PREDICT_PATH=${ML_SERVER_B_MODEL1_PREDICT_PATH:-/api/v1/inference/model1/predict}
      - ML_SERVER_B_MODEL2_PREDICT_PATH=${ML_SERVER_B_MODEL2_PREDICT_PATH:-/api/v1/inference/model2/predict}
      - ML_SERVER_B_MODEL1_TRAIN_PATH=${ML_SERVER_B_MODEL1_TRAIN_PATH:-/api/v1/training/model1/train}
      - ML_SERVER_B_MODEL2_TRAIN_PATH=${ML_SERVER_B_MODEL2_TRAIN_PATH:-/api/v1/training/model2/train}
      - ML_SERVER_B_REQUEST_TIMEOUT_SECONDS=${ML_SERVER_B_REQUEST_TIMEOUT_SECONDS:-30}
      - ML_SERVER_B_CALLBACK_TIMEOUT_SECONDS=${ML_SERVER_B_CALLBACK_TIMEOUT_SECONDS:-10}
      - ML_SERVER_B_HMAC_SECRET=${ML_SERVER_B_HMAC_SECRET:-change-me-server-b-callback-secret}
      - ML_SERVER_B_HMAC_SECRET_FALLBACKS=${ML_SERVER_B_HMAC_SECRET_FALLBACKS:-}
      - ML_CALLBACK_ACCEPT_SERVER_B_SHA256=${ML_CALLBACK_ACCEPT_SERVER_B_SHA256:-true}
      - ML_CALLBACK_ACCEPT_LEGACY_HMAC=${ML_CALLBACK_ACCEPT_LEGACY_HMAC:-false}
      - ML_CALLBACK_REPLAY_TTL_SECONDS=${ML_CALLBACK_REPLAY_TTL_SECONDS:-300}
      - ML_SERVER_A_CALLBACK_URL=${ML_SERVER_A_CALLBACK_URL:-}
      - ML_SERVER_A_TRAINING_CALLBACK_URL=${ML_SERVER_A_TRAINING_CALLBACK_URL:-}
      - ML_TRAINING_MIRROR_ENABLED=${ML_TRAINING_MIRROR_ENABLED:-true}
      - ML_TRAINING_MIRROR_MAX_RETRIES=${ML_TRAINING_MIRROR_MAX_RETRIES:-3}
      - ML_TRAINING_MIRROR_BACKOFF_SECONDS=${ML_TRAINING_MIRROR_BACKOFF_SECONDS:-1}
      - ML_TRAINING_MIRROR_DEAD_LETTER_LOG_PATH=${ML_TRAINING_MIRROR_DEAD_LETTER_LOG_PATH:-/app/logs/ml_training_mirror_dead_letter.jsonl}
      - ML_SERVER_B_MINIO_ENDPOINT_URL=${ML_SERVER_B_MINIO_ENDPOINT_URL:-${MINIO_ENDPOINT_URL:-http://minio:9000}}
      - ML_SERVER_B_MINIO_ACCESS_KEY=${ML_SERVER_B_MINIO_ACCESS_KEY:-${MINIO_ACCESS_KEY:-minioadmin}}
      - ML_SERVER_B_MINIO_SECRET_KEY=${ML_SERVER_B_MINIO_SECRET_KEY:-${MINIO_SECRET_KEY:-minioadmin}}
      - ML_SERVER_B_MINIO_REGION_NAME=${ML_SERVER_B_MINIO_REGION_NAME:-${MINIO_REGION_NAME:-us-east-1}}
      - ML_SERVER_B_MINIO_BUCKET_NAME_OVERRIDE=${ML_SERVER_B_MINIO_BUCKET_NAME_OVERRIDE:-}
      - ML_SERVER_B_MINIO_KEY_PREFIX=${ML_SERVER_B_MINIO_KEY_PREFIX:-}
      - HOSPITAL_API_LOCALHOST_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped
    # DO NOT scale celery_beat — it must run as a single instance

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_prod_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_prod_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8096:8080"
    depends_on:
      - db

  e2e-ml-workflow:
    build:
      context: .
      dockerfile: Dockerfile
    command: python scripts/run_real_ml_e2e_workflow.py
    volumes:
      - app_logs:/app/logs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MINIO_ENDPOINT_URL=${MINIO_ENDPOINT_URL:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_REGION_NAME=${MINIO_REGION_NAME:-us-east-1}
      - ML_DATASET_BUCKET_NAME=${ML_DATASET_BUCKET_NAME:-ml-input}
      - ML_SERVER_B_BASE_URL=${ML_SERVER_B_BASE_URL:-}
      - ML_SERVER_A_CALLBACK_URL=${ML_SERVER_A_CALLBACK_URL:-}
      - ML_SERVER_A_TRAINING_CALLBACK_URL=${ML_SERVER_A_TRAINING_CALLBACK_URL:-}
      - ML_SERVER_B_HMAC_SECRET=${ML_SERVER_B_HMAC_SECRET:-change-me-server-b-callback-secret}
      - ML_SERVER_B_HMAC_SECRET_FALLBACKS=${ML_SERVER_B_HMAC_SECRET_FALLBACKS:-}
      - ML_CALLBACK_ACCEPT_SERVER_B_SHA256=${ML_CALLBACK_ACCEPT_SERVER_B_SHA256:-true}
      - ML_CALLBACK_ACCEPT_LEGACY_HMAC=${ML_CALLBACK_ACCEPT_LEGACY_HMAC:-false}
      - ML_TRAINING_MIRROR_ENABLED=${ML_TRAINING_MIRROR_ENABLED:-true}
      - ML_SERVER_B_MINIO_ENDPOINT_URL=${ML_SERVER_B_MINIO_ENDPOINT_URL:-${MINIO_ENDPOINT_URL:-http://minio:9000}}
      - ML_SERVER_B_MINIO_ACCESS_KEY=${ML_SERVER_B_MINIO_ACCESS_KEY:-${MINIO_ACCESS_KEY:-minioadmin}}
      - ML_SERVER_B_MINIO_SECRET_KEY=${ML_SERVER_B_MINIO_SECRET_KEY:-${MINIO_SECRET_KEY:-minioadmin}}
      - ML_SERVER_B_MINIO_REGION_NAME=${ML_SERVER_B_MINIO_REGION_NAME:-${MINIO_REGION_NAME:-us-east-1}}
      - ML_SERVER_B_MINIO_BUCKET_NAME_OVERRIDE=${ML_SERVER_B_MINIO_BUCKET_NAME_OVERRIDE:-}
      - ML_SERVER_B_MINIO_KEY_PREFIX=${ML_SERVER_B_MINIO_KEY_PREFIX:-}
      - REAL_API_BASE_URL=http://backend:8080
      - ML_E2E_REPORT_PATH=/app/logs/real_ml_e2e_report.json
      - HOSPITAL_API_LOCALHOST_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
      celery_worker:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: "no"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_files:/app/static:ro
      - media_files:/app/media:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:
  static_files:
  media_files:
  app_logs:
