name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ------------------------------------------------------------------
  # Stage 1: Install & cache dependencies
  # ------------------------------------------------------------------
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install requirements
        run: |
          pip install -r requirements-dev.txt

  # ------------------------------------------------------------------
  # Stage 2: Lint
  # ------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install requirements
        run: pip install -r requirements-dev.txt

      - name: flake8
        run: flake8 apps/ common/ config/

      - name: black (check only)
        run: black --check apps/ common/ config/

      - name: bandit (security scan)
        run: bandit -r apps/ common/ -ll -x apps/*/migrations/

  # ------------------------------------------------------------------
  # Stage 3: Test
  # ------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hrsp_test_db
          POSTGRES_USER: hrsp_user
          POSTGRES_PASSWORD: hrsp_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ${{ secrets.TEST_DJANGO_SECRET_KEY }}
      DATABASE_URL: postgresql://hrsp_user:hrsp_password@localhost:5432/hrsp_test_db
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      JWT_SIGNING_KEY: ${{ secrets.TEST_JWT_SIGNING_KEY }}
      API_CONFIG_ENCRYPTION_KEY: ${{ secrets.TEST_API_CONFIG_ENCRYPTION_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install requirements
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --settings=config.settings.dev

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=apps \
            --cov=common \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ------------------------------------------------------------------
  # Stage 4: Docker build validation (main branch only)
  # ------------------------------------------------------------------
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config

      - name: Build production image
        run: docker build --target production -t hrsp-backend:ci .
