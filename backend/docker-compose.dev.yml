services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://hrsp_user:hrsp_password@db:5432/hrsp_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - USE_MINIO_CHAT_STORAGE=true
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost:9100
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=hrsp-chat-attachments
      - HOSPITAL_API_LOCALHOST_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A config.celery worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://hrsp_user:hrsp_password@db:5432/hrsp_db
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - USE_MINIO_CHAT_STORAGE=true
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost:9100
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=hrsp-chat-attachments
      - HOSPITAL_API_LOCALHOST_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=postgresql://hrsp_user:hrsp_password@db:5432/hrsp_db
      - CELERY_BROKER_URL=redis://redis:6379/1
      - USE_MINIO_CHAT_STORAGE=true
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost:9100
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=hrsp-chat-attachments
      - HOSPITAL_API_LOCALHOST_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=hrsp_db
      - POSTGRES_USER=hrsp_user
      - POSTGRES_PASSWORD=hrsp_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrsp_user -d hrsp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_dev_data:/data
    ports:
      - "9100:9000"
      - "9101:9001"
    restart: unless-stopped

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8096:8080"
    depends_on:
      - db

volumes:
  postgres_dev_data:
  redis_dev_data:
  minio_dev_data:
