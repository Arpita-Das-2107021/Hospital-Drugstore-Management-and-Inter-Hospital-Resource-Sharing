version: '3.8'

services:
  hospital_2_db:
    image: mysql:8.0
    container_name: hospital_2_db
    environment:
      MYSQL_ROOT_PASSWORD: root2026
      MYSQL_DATABASE: hospital_2_db
      MYSQL_USER: hospital2user
      MYSQL_PASSWORD: hospital2pass
    ports:
      - "3361:3306"
    volumes:
      - hospital_2_data:/var/lib/mysql
      - ./sql_scripts:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uhospital2user", "-phospital2pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hospital_2_data: