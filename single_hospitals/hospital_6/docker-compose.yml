version: '3.8'

services:
  hospital_6_db:
    image: postgres:15-alpine
    container_name: hospital_6_db
    environment:
      POSTGRES_DB: hospital_6_db
      POSTGRES_USER: hospital6user
      POSTGRES_PASSWORD: hospital6pass
    ports:
      - "5446:5432"
    volumes:
      - hospital_6_data:/var/lib/postgresql/data
      - ./sql_scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital6user -d hospital_6_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hospital_6_data: