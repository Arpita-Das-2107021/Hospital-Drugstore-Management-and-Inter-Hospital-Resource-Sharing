version: '3.8'

services:
  hospital_9_db:
    image: postgres:15-alpine
    container_name: hospital_9_db
    environment:
      POSTGRES_DB: hospital_9_db
      POSTGRES_USER: hospital9user
      POSTGRES_PASSWORD: hospital9pass
    ports:
      - "5449:5432"
    volumes:
      - hospital_9_data:/var/lib/postgresql/data
      - ./sql_scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital9user -d hospital_9_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hospital_9_data: