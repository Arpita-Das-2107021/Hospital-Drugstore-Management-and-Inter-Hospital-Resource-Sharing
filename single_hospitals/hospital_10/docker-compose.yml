version: '3.8'

services:
  hospital_10_db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hospital_10_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Hospital10Pass!"
      MSSQL_PID: "Express"
    ports:
      - "1442:1433"
    volumes:
      - hospital_10_data:/var/opt/mssql
      - ./sql_scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Hospital10Pass!' -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  hospital_10_data: