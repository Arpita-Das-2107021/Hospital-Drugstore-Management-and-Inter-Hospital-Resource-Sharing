version: '3.8'

services:
  hospital_1_db:
    image: postgres:15-alpine
    container_name: hospital_1_db
    environment:
      POSTGRES_DB: hospital_1_db
      POSTGRES_USER: hospital1user
      POSTGRES_PASSWORD: hospital1pass
    ports:
      - "5441:5432"
    volumes:
      - hospital_1_data:/var/lib/postgresql/data
      - ./sql_scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital1user -d hospital_1_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hospital_1_data: