name: Monorepo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  backend-test:
    name: Backend and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hrsp_test_db
          POSTGRES_USER: hrsp_user
          POSTGRES_PASSWORD: hrsp_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ${{ secrets.TEST_DJANGO_SECRET_KEY || 'dev-secret-key' }}
      DATABASE_URL: postgresql://hrsp_user:hrsp_password@localhost:5432/hrsp_test_db
      REDIS_URL: redis://localhost:6379/0
      CHANNEL_LAYER_REDIS_URL: redis://localhost:6379/3
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      JWT_SIGNING_KEY: ${{ secrets.TEST_JWT_SIGNING_KEY || 'dev-jwt-signing-key' }}
      API_CONFIG_ENCRYPTION_KEY: ${{ secrets.TEST_API_CONFIG_ENCRYPTION_KEY || 'dev-api-config-encryption-key' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install requirements
        run: pip install -r requirements-dev.txt

    #   - name: Lint
    #     run: |
    #       flake8 apps/ common/ config/
    #       black --check apps/ common/ config/
    #       bandit -r apps/ common/ -ll -x apps/*/migrations/

      - name: Run migrations
        run: python manage.py migrate --settings=config.settings.test

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=apps \
            --cov=common \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: backend/coverage.xml

  backend-docker-build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config

      - name: Build production image
        run: docker build --target production -t hrsp-backend:ci .

  frontend-test-build:
    name: Frontend Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/frontend/package.json

      - name: Install dependencies
        run: npm install

    #   - name: Lint
    #     run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/frontend/dist
